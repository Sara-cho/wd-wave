<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 설계의뢰 | WD웨이브</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #F1F5F9; color: #1E293B; }
.header { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); padding: 20px 24px 16px; }
.header-eyebrow { font-size: 11px; color: #6366F1; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 5px; }
.header-title { font-size: 22px; font-weight: 900; color: #F8FAFC; margin-bottom: 3px; }
.header-sub { font-size: 12px; color: #94A3B8; }
.header-flow { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.07); }
.flow-pill { padding: 4px 13px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.flow-from { background: rgba(99,102,241,0.25); color: #A5B4FC; }
.flow-arrow { color: #475569; }
.flow-to { background: rgba(34,197,94,0.18); color: #86EFAC; }
.flow-spacer { flex: 1; }
.total-badge { background: #6366F1; color: white; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 800; }
.content { max-width: 800px; margin: 0 auto; padding: 18px 14px 70px; }
.summary-row { display: flex; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 18px; }
.summary-cell { flex: 1; padding: 13px 14px; text-align: center; border-right: 1px solid #F1F5F9; }
.summary-cell:last-child { border-right: none; }
.summary-num { font-size: 24px; font-weight: 900; color: #1E293B; line-height: 1; }
.summary-num.purple { color: #6366F1; }
.summary-label { font-size: 10px; color: #94A3B8; font-weight: 600; margin-top: 3px; }
.company-block { margin-bottom: 18px; }
.company-title-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #1E293B; color: white; border-radius: 12px 12px 0 0; }
.company-name { font-size: 14px; font-weight: 800; flex: 1; }
.co-badge { font-size: 12px; font-weight: 700; color: #A5B4FC; background: rgba(99,102,241,0.3); padding: 2px 10px; border-radius: 20px; }
.co-premium { font-size: 11px; font-weight: 700; color: #A78BFA; }
.product-section { background: white; border-left: 1px solid #E2E8F0; border-right: 1px solid #E2E8F0; border-bottom: 1px solid #F0F4F8; padding: 10px 14px 6px; }
.product-section:last-child { border-bottom: 1px solid #E2E8F0; border-radius: 0 0 12px 12px; }
.product-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #F1F5F9; }
.product-accent { width: 3px; height: 16px; border-radius: 2px; flex-shrink: 0; }
.product-name { font-size: 13px; font-weight: 800; color: #1E293B; flex: 1; }
.product-count { font-size: 12px; font-weight: 800; padding: 2px 10px; border-radius: 12px; }
.client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 8px; padding-bottom: 8px; }
.client-card { background: #FAFAFA; border: 1px solid #E8EEF4; border-radius: 10px; padding: 10px 12px; border-left: 3px solid #E2E8F0; }
.client-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.client-name { font-size: 14px; font-weight: 800; color: #0F172A; }
.client-birth { font-size: 11px; color: #64748B; margin-left: 5px; }
.client-status-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; flex-shrink: 0; }
.client-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 7px; }
.tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px; }
.tag-health-건강체 { background: #DCFCE7; color: #166534; }
.tag-health-간편 { background: #FEF3C7; color: #92400E; }
.tag-health-유병자 { background: #FEE2E2; color: #991B1B; }
.tag-renewal-갱신형 { background: #EDE9FE; color: #5B21B6; }
.tag-renewal-비갱신형 { background: #CFFAFE; color: #155E75; }
.client-coverage { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.coverage-label { font-size: 11px; font-weight: 600; color: #334155; flex: 1; }
.client-premium-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.premium-range { font-size: 10px; font-weight: 700; color: #6366F1; background: #EEF2FF; padding: 2px 7px; border-radius: 8px; }
.design-premium { font-size: 11px; font-weight: 800; color: #7C3AED; }
.client-note { font-size: 11px; color: #475569; line-height: 1.5; margin-top: 5px; padding: 5px 8px; background: #F1F5F9; border-radius: 6px; border-left: 2px solid #6366F1; }
.s-설계의뢰완료 { background: #EDE9FE; color: #5B21B6; }
.s-설계완료 { background: #CFFAFE; color: #155E75; }
.s-터치완료 { background: #FEE2E2; color: #991B1B; }
.s-체결완료 { background: #DCFCE7; color: #166534; }
.no-data { text-align: center; padding: 60px; color: #94A3B8; }
.footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0F172A; color: #475569; padding: 8px 20px; text-align: center; font-size: 11px; }
.footer strong { color: #94A3B8; }
.error-box { max-width: 440px; margin: 80px auto; background: white; border-radius: 14px; padding: 36px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.error-box .icon { font-size: 48px; margin-bottom: 14px; }
.error-box h2 { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
.error-box p { font-size: 13px; color: #64748B; line-height: 1.7; }
@media (max-width: 500px) { .client-grid { grid-template-columns: 1fr; } .summary-num { font-size: 18px; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  const root = document.getElementById('root');
  let data = null, parseError = null;
  try {
    const hash = location.hash.replace('#','').trim();
    if(!hash) throw new Error('데이터 없음');
    data = JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch(e){ parseError = e.message; }
  if(parseError || !data){
    root.innerHTML = '<div style="padding:20px;"><div class="error-box"><div class="icon">📋</div><h2>설계의뢰 내역을 불러올 수 없습니다</h2><p>링크가 만료되었거나 올바르지 않습니다.<br>담당 설계사에게 새 링크를 요청해주세요.</p></div></div>';
    return;
  }
  const { date, from, filterCompany, groups } = data;
  const byCompany = {};
  Object.entries(groups||{}).forEach(([co, clients]) => {
    if(!byCompany[co]) byCompany[co] = {};
    (clients||[]).forEach(c => { const pr=c.product||'기타'; if(!byCompany[co][pr])byCompany[co][pr]=[]; byCompany[co][pr].push(c); });
  });
  const companies = Object.keys(byCompany);
  let grandTotal=0, grandPremium=0;
  companies.forEach(co=>Object.values(byCompany[co]).forEach(list=>{ grandTotal+=list.length; list.forEach(c=>{grandPremium+=Number(c.designPremium)||0;}); }));
  function accentColor(l){ if(l.some(c=>c.status==='체결완료'))return'#22C55E'; if(l.some(c=>c.status==='터치완료'))return'#EF4444'; if(l.some(c=>c.status==='설계완료'))return'#06B6D4'; return'#8B5CF6'; }
  function borderColor(s){ return({'설계의뢰완료':'#8B5CF6','설계완료':'#06B6D4','터치완료':'#EF4444','체결완료':'#22C55E'})[s]||'#E2E8F0'; }
  const titleLabel = filterCompany ? filterCompany+' 설계의뢰' : (date||'')+' 설계의뢰';
  const headerHTML = '<div class="header"><div class="header-eyebrow">WD WAVE · 설계매니저 전달</div><div class="header-title">'+titleLabel+'</div><div class="header-sub">'+companies.length+'개사 · '+grandTotal+'명'+(grandPremium>0?' · 설계보험료 '+grandPremium.toLocaleString()+'원':'')+'</div><div class="header-flow"><span class="flow-pill flow-from">📤 '+(from||'설계사')+'</span><span class="flow-arrow">→</span><span class="flow-pill flow-to">📥 설계매니저</span><span class="flow-spacer"></span><span class="total-badge">'+grandTotal+'건</span></div></div>';
  const productCount=[...new Set(Object.values(byCompany).flatMap(p=>Object.keys(p)))].length;
  const summaryHTML='<div class="summary-row"><div class="summary-cell"><div class="summary-num purple">'+grandTotal+'</div><div class="summary-label">총 의뢰 건수</div></div><div class="summary-cell"><div class="summary-num">'+companies.length+'</div><div class="summary-label">보험사 수</div></div><div class="summary-cell"><div class="summary-num">'+productCount+'</div><div class="summary-label">상품 종류</div></div><div class="summary-cell"><div class="summary-num" style="font-size:15px;padding-top:5px;">'+(grandPremium>0?grandPremium.toLocaleString():'-')+'</div><div class="summary-label">설계보험료(원)</div></div></div>';
  function cardHTML(c){
    const noteText=[c.additionalNote,c.designNote].filter(Boolean).join(' · ');
    const cov=c.coverage?(c.coverageAmt?c.coverage+' <strong>'+Number(c.coverageAmt).toLocaleString()+'만원</strong>':c.coverage):'';
    return '<div class="client-card" style="border-left-color:'+borderColor(c.status)+';"><div class="client-top"><div><span class="client-name">'+(c.name||'-')+'</span>'+(c.birthDate?'<span class="client-birth">'+c.birthDate+'</span>':'')+'</div><span class="client-status-badge s-'+c.status+'">'+(c.status||'')+'</span></div><div class="client-tags">'+(c.healthType?'<span class="tag tag-health-'+c.healthType+'">'+c.healthType+'</span>':'')+(c.renewalType?'<span class="tag tag-renewal-'+c.renewalType+'">'+c.renewalType+'</span>':'')+'</div>'+(cov?'<div class="client-coverage"><span class="coverage-label">📌 '+cov+'</span></div>':'')+'<div class="client-premium-row">'+(c.premiumRange?'<span class="premium-range">'+c.premiumRange+'</span>':'<span></span>')+(c.designPremium?'<span class="design-premium">'+Number(c.designPremium).toLocaleString()+'원</span>':'')+'</div>'+(noteText?'<div class="client-note">'+noteText+'</div>':'')+'</div>';
  }
  let blocksHTML='';
  companies.forEach(co=>{
    const products=byCompany[co]; const prKeys=Object.keys(products);
    const coTotal=prKeys.reduce((s,pr)=>s+products[pr].length,0);
    const coPremium=prKeys.reduce((s,pr)=>s+products[pr].reduce((a,c)=>a+(Number(c.designPremium)||0),0),0);
    let sects='';
    prKeys.forEach(pr=>{
      const list=products[pr]; const acc=accentColor(list);
      const prPrem=list.reduce((s,c)=>s+(Number(c.designPremium)||0),0);
      sects+='<div class="product-section"><div class="product-header"><div class="product-accent" style="background:'+acc+';"></div><div class="product-name">'+pr+'</div><span class="product-count" style="background:'+acc+'22;color:'+acc+';">'+list.length+'명</span>'+(prPrem>0?'<span style="font-size:11px;font-weight:700;color:#7C3AED;">'+prPrem.toLocaleString()+'원</span>':'')+'</div><div class="client-grid">'+list.map(c=>cardHTML(c)).join('')+'</div></div>';
    });
    blocksHTML+='<div class="company-block"><div class="company-title-bar"><div class="company-name">🏢 '+co+'</div><span class="co-badge">'+coTotal+'명</span>'+(coPremium>0?'<span class="co-premium">'+coPremium.toLocaleString()+'원</span>':'')+'</div>'+sects+'</div>';
  });
  root.innerHTML=headerHTML+'<div class="content">'+summaryHTML+blocksHTML+'</div><div class="footer"><strong>WD WAVE</strong> · 설계매니저 전달용 업무문서 · '+(date||'')+'</div>';
})();
</script>
</body>
</html>
