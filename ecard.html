*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F0F1F8;min-height:100vh;}

/* 명함 카드 */
.card-main{background:linear-gradient(145deg,#1A1A3E,#4A3F7A,#2D3561);border-radius:24px;padding:32px 24px 28px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 12px 40px rgba(74,63,122,.35);}
.card-main::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.05);border-radius:50%;}
.card-main::after{content:'🌊';position:absolute;bottom:16px;right:20px;font-size:48px;opacity:.15;}
.card-brand{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:1.5px;margin-bottom:18px;}
.card-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;margin-bottom:14px;}
.card-name{font-size:24px;font-weight:800;color:#fff;margin-bottom:4px;}
.card-role{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:3px;}
.card-career{font-size:11px;color:rgba(255,255,255,.55);}

/* 연락 버튼 */
.contact-row{display:flex;gap:10px;margin-bottom:14px;}
.btn-tel{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;background:linear-gradient(135deg,#1A1A3E,#4A3F7A);color:#fff;border-radius:13px;text-decoration:none;font-size:14px;font-weight:800;}
.btn-kakao{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;background:#FEE500;color:#3A1D1D;border-radius:13px;text-decoration:none;font-size:14px;font-weight:800;}

/* 정보 카드 */
.info-card{background:#fff;border:1.5px solid #E8E8F4;border-radius:14px;padding:16px;margin-bottom:12px;}
.info-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #F4F4F8;}
.info-row:last-child{border:none;padding-bottom:0;}
.info-ico{width:30px;height:30px;border-radius:8px;background:#f0eeff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.info-label{font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:2px;}
.info-val{font-size:13px;font-weight:700;color:#1A1A2E;}

/* 신뢰 배지 */
.trust-card{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:14px;padding:16px;margin-bottom:12px;}
.trust-title{font-size:11px;font-weight:800;color:#4A3F7A;margin-bottom:10px;letter-spacing:.05em;}
.trust-list{display:flex;flex-direction:column;gap:7px;}
.trust-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#4A3F7A;font-weight:600;}
.trust-item::before{content:'✦';color:#8B7AB8;font-size:10px;}

/* 저장 버튼 */
.save-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#1A1A3E,#4A3F7A);color:#fff;border-radius:13px;text-align:center;font-size:14px;font-weight:800;text-decoration:none;margin-bottom:10px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.hub-btn{display:block;width:100%;padding:13px;background:#fff;border:1.5px solid #4A3F7A;color:#4A3F7A;border-radius:13px;text-align:center;font-size:13px;font-weight:700;text-decoration:none;}

.footer{text-align:center;padding:16px 0 0;font-size:10px;color:#94a3b8;line-height:1.8;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .3s;pointer-events:none;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
