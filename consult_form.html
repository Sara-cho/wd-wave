<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WD WAVE | 간편 상담 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>
<style>
:root{--p:#4A3F7A;--pl:#6d5fa8;--pm:#8B7AB8;--bg:#F7F8FC;--border:#E8E8F0;--muted:#6B7280;--text:#1A1A2E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.hd{background:linear-gradient(135deg,var(--p),var(--pl));padding:0 20px;height:56px;display:flex;align-items:center;gap:10px;}
.hd-logo{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hd-txt{font-size:16px;font-weight:800;color:#fff;}
.hd-sub{font-size:11px;color:rgba(255,255,255,.7);margin-left:auto;}
.wrap{max-width:520px;margin:0 auto;padding:20px 16px 48px;}
.banner{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:1.5px solid #c4b5fd;border-radius:16px;padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;}
.banner-ico{font-size:32px;flex-shrink:0;}
.banner-txt{font-size:13px;font-weight:700;color:var(--p);line-height:1.6;}
.banner-sub{font-size:11px;color:var(--pl);font-weight:500;margin-top:2px;}
.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:14px;}
.card-title{font-size:12px;font-weight:800;color:#334155;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row2>*{margin-bottom:10px;}
.row1{margin-bottom:10px;}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;}
.req{color:#ef4444;}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:"Noto Sans KR",sans-serif;outline:none;background:#fff;color:var(--text);transition:border-color .15s;}
.inp:focus{border-color:var(--pm);}
.inp::placeholder{color:#cbd5e1;}
select.inp{cursor:pointer;}
textarea.inp{resize:vertical;min-height:80px;}
.purpose-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px;}
.purpose-btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);font-family:"Noto Sans KR",sans-serif;transition:all .15s;}
.purpose-btn.on{background:var(--p);color:#fff;border-color:var(--p);}
.agree-box{background:#f8f9ff;border:1px solid #c7d2fe;border-radius:10px;padding:13px 15px;margin-bottom:18px;display:flex;align-items:flex-start;gap:10px;}
.agree-box input{width:16px;height:16px;margin-top:2px;accent-color:var(--p);flex-shrink:0;cursor:pointer;}
.agree-box label{font-size:11px;color:#475569;line-height:1.75;cursor:pointer;}
.agree-req{font-weight:800;color:var(--p);}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:"Noto Sans KR",sans-serif;letter-spacing:.02em;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
#done-view{display:none;}
.done-card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:44px 28px;text-align:center;margin-bottom:16px;}
.done-ico{font-size:64px;margin-bottom:18px;}
.done-title{font-size:20px;font-weight:800;color:var(--p);margin-bottom:8px;}
.done-sub{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:20px;}
.done-badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:16px;}
.done-badge-new{background:#f3e8ff;color:#7c3aed;border:1px solid #d8b4fe;}
.done-badge-exist{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd;}
.done-info{background:#f8f9ff;border-radius:12px;padding:14px 16px;text-align:left;margin-bottom:20px;}
.done-info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
.done-info-row:last-child{border:none;}
.done-info-label{color:var(--muted);font-weight:600;}
.done-info-val{color:var(--text);font-weight:700;}
.done-contact{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.done-contact-ico{font-size:24px;flex-shrink:0;}
.done-contact-txt{font-size:12px;color:var(--p);font-weight:600;line-height:1.6;}
.err-msg{font-size:11px;color:#ef4444;margin-top:4px;display:none;}
.footer{text-align:center;font-size:11px;color:#cbd5e1;margin-top:24px;}
.footer a{color:var(--pl);text-decoration:none;}
@media(max-width:400px){.row2{grid-template-columns:1fr;}.banner{flex-direction:column;text-align:center;}}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">🌊</div>
  <div class="hd-txt">WD WAVE</div>
  <div class="hd-sub">우리동네보험지킴이</div>
</div>

<div id="form-view">
<div class="wrap">
  <div class="banner">
    <div class="banner-ico">🙋‍♀️</div>
    <div>
      <div class="banner-txt">간편 상담 신청</div>
      <div class="banner-sub">아래 내용을 입력하시면 담당 FP가 빠르게 연락드립니다</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📋 기본 정보</div>
    <div class="row2">
      <div class="fld"><label>고객명 <span class="req">*</span></label><input class="inp" id="f-name" type="text" placeholder="홍길동"></div>
      <div class="fld"><label>연락처 <span class="req">*</span></label><input class="inp" id="f-phone" type="tel" placeholder="010-0000-0000"></div>
      <div class="fld"><label>직업</label>
        <select class="inp" id="f-job">
          <option value="">선택 안 함</option>
          <option>직장인</option><option>자영업</option><option>공무원</option>
          <option>전문직</option><option>주부</option><option>학생</option><option>기타</option>
        </select>
      </div>
      <div class="fld"><label>거주 지역</label><input class="inp" id="f-address" type="text" placeholder="예: 서울 광진구"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">💬 상담 내용</div>
    <div class="fld row1">
      <label>상담 목적 <span class="req">*</span></label>
      <div class="purpose-group">
        <button type="button" class="purpose-btn" onclick="selectPurpose(this)">보장분석 요청</button>
        <button type="button" class="purpose-btn" onclick="selectPurpose(this)">보험 가입 상담</button>
        <button type="button" class="purpose-btn" onclick="selectPurpose(this)">기존 보험 점검</button>
        <button type="button" class="purpose-btn" onclick="selectPurpose(this)">보험금 청구 문의</button>
        <button type="button" class="purpose-btn" onclick="selectPurpose(this)">기타 문의</button>
      </div>
      <input type="hidden" id="f-purpose-hidden">
      <div class="err-msg" id="err-purpose">상담 목적을 선택해주세요</div>
    </div>
    <div class="fld">
      <label>문의 내용</label>
      <textarea class="inp" id="f-content" placeholder="궁금하신 내용이나 현재 상황을 자유롭게 작성해 주세요."></textarea>
    </div>
  </div>
  <div class="agree-box">
    <input type="checkbox" id="f-agree">
    <label for="f-agree">
      <span class="agree-req">[필수]</span> 수집된 개인정보는 상담 목적으로만 사용되며, 상담 완료 후 요청 시 즉시 삭제됩니다.
    </label>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">🙋 상담 신청하기</button>
  <div class="footer">WD WAVE | 우리동네보험지킴이 &nbsp;·&nbsp; 문의 <a href="tel:010-6396-9896">010-6396-9896</a></div>
</div>
</div>

<div id="done-view">
<div class="wrap">
  <div class="done-card">
    <div class="done-ico">✅</div>
    <div class="done-title">상담 신청 완료!</div>
    <div class="done-sub">빠른 시일 내에 담당 FP가<br>연락 드리겠습니다 😊</div>
    <div id="done-cust-badge"></div>
    <div class="done-info" id="done-info-box"></div>
    <div class="done-contact">
      <div class="done-contact-ico">💬</div>
      <div class="done-contact-txt">
        급하신 경우 카카오톡 채널이나<br>전화로 직접 연락 주세요<br>
        <strong>📞 010-6396-9896</strong>
      </div>
    </div>
  </div>
  <div class="footer">WD WAVE | 우리동네보험지킴이</div>
</div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// WD WAVE | consult_form.html
// 간편상담신청 → custId 단일 기준으로 전체 연결
// ══════════════════════════════════════════════════════════

// ── Supabase 초기화 ─────────────────────────────────────
var SUPA_URL = 'https://mzftzadtoepcrwhnwdmn.supabase.co';
var SUPA_KEY = 'sb_publishable_rp4QHXzXMgnxKmKL0QERAw_cKX0dSgh';
var _supa    = null;
(function(){
  try{
    if(typeof supabase !== 'undefined' && supabase.createClient){
      _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
      console.log('[CF] Supabase 초기화 완료');
    }
  }catch(e){ console.warn('[CF] Supabase 초기화 실패:', e.message); }
})();

// ── 로컬 저장소 키 ──────────────────────────────────────
var DBK    = 'wdcare_v40s4';
var CRKEY  = 'wd_cr_list';
var WCMKEY = 'wd_wcm3';
var TDOKEY = 'wd_todos';

// ── 유틸 ────────────────────────────────────────────────
function normPh(p){ return (p||'').replace(/\D/g,''); }
function gdb(){ try{return JSON.parse(localStorage.getItem(DBK)||'{"customers":[]}')}catch(e){return{customers:[]};} }
function sdb(d){ try{localStorage.setItem(DBK,JSON.stringify(d));}catch(e){} }

// ── UI: 상담 목적 선택 ──────────────────────────────────
function selectPurpose(btn){
  document.querySelectorAll('.purpose-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('f-purpose-hidden').value = btn.textContent;
  document.getElementById('err-purpose').style.display = 'none';
}

// ══════════════════════════════════════════════════════════
// STEP 1: 기존 고객 판별 (전화번호 단독)
// ══════════════════════════════════════════════════════════
async function findExistingCust(np){
  if(!np) return null;
  // Supabase phone 컬럼 직접 검색
  if(_supa){
    try{
      var r = await _supa.from('customers').select('id,name,data').eq('phone', np).limit(1);
      if(!r.error && r.data && r.data.length > 0){
        console.log('[CF] Supabase 기존고객:', r.data[0].id);
        return r.data[0];
      }
    }catch(e){ console.warn('[CF] Supabase phone 검색 실패:', e.message); }
  }
  // 로컬 폴백
  var db = gdb();
  for(var i=0; i<db.customers.length; i++){
    var c = db.customers[i];
    var cd = (c.data && c.data.customer) || {};
    if(normPh(cd.phone || c.phone || '') === np){
      console.log('[CF] 로컬 기존고객:', c.id);
      return { id: c.id, data: c.data, name: c.name };
    }
  }
  return null;
}

// ══════════════════════════════════════════════════════════
// STEP 2: WD WAVE 완전한 고객 데이터 구조 생성
// ══════════════════════════════════════════════════════════
function buildCustomerData(custId, custName, phone, job, address, todayStr, now){
  return {
    id: custId,
    customer: {
      name:    custName,
      phone:   phone,
      job:     job     || '',
      address: address || '',
      regdate: todayStr,
      birth:   '',
      gender:  '',
      note:    '[간편상담폼 자동등록]'
    },
    consult:    {},
    kb:         {},
    gate:       { g1:false, g2:false, g3:false },
    clientType: '',
    journal:    { call:'', kakao:'', touches:[], jStatus:'', nextAction:'', unclaim:'' },
    extra:      {},
    touches:    [],
    designRequests: [],
    callLogs:   [],
    ca_history: [],
    savedAt:    now
  };
}

// ══════════════════════════════════════════════════════════
// 메인 흐름 - custId 하나로 모든 저장소 연결
// ══════════════════════════════════════════════════════════
async function cfFullFlow(custName, phone, job, address, purpose, content){
  var now      = new Date().toISOString();
  var todayStr = now.split('T')[0];
  var np       = normPh(phone);
  var nd       = new Date(todayStr); nd.setDate(nd.getDate() + 2);
  var nextStr  = nd.toISOString().split('T')[0];
  var crId     = 'CR_' + Date.now();

  // [1] 기존 고객 판별
  var existing   = await findExistingCust(np);
  var isExisting = !!existing;
  var custId     = isExisting ? existing.id : ('CUST_' + Date.now());

  console.log('[CF] 시작 | custId:', custId, '| crId:', crId, '| isExisting:', isExisting);

  // [2] 공통 항목 생성
  var touchEntry = {
    date:todayStr, type:'간편상담폼', sum:purpose||'',
    status:'요청', nextDate:nextStr, next:nextStr,
    memo:content||'', createdAt:now, source:'consult_form', crId:crId
  };
  var consultEntry = {
    date:todayStr, type:'상담내역',
    sum:'[상담요청] '+(purpose||'상담신청'),
    status:'대기', next:'', purpose:purpose||'', monthly:'',
    memo:content||'', createdAt:now, source:'상담요청', crId:crId
  };

  // [3A] 신규 고객
  if(!isExisting){
    var custData = buildCustomerData(custId, custName, phone, job, address, todayStr, now);
    custData.touches.unshift(consultEntry);
    custData.touches.unshift(touchEntry);

    // Supabase INSERT
    if(_supa){
      var cusPayload = {
        id:            custId,
        name:          custName,
        birth_date:    null,
        phone:         np,
        status:        'S',
        next_action:   null,
        last_touch_at: now,
        owner:         '최윤경',
        owner_id:      'kfcyk50',
        source:        'consult_form',
        data:          custData
      };
      console.log('[CF] customers INSERT | name:', cusPayload.name, '| id:', cusPayload.id);
      try{
        var r = await _supa.from('customers').insert(cusPayload);
        if(r.error) throw new Error(r.error.message);
        console.log('[CF] Supabase customers INSERT 완료 | custId:', custId);
      }catch(e){
        console.error('[CF] customers INSERT 실패:', e.message);
      }
    }

    // 로컬 저장
    var db = gdb();
    if(!db.customers) db.customers = [];
    db.customers.unshift({
      id:custId, name:custName, status:'S',
      updatedAt:now, last_touch_at:now, source:'consult_form',
      data:custData
    });
    sdb(db);
    console.log('[CF] 로컬 신규고객 저장 완료 | custId:', custId);

  // [3B] 기존 고객 - 터치만 추가
  } else {
    if(_supa){
      try{
        var er = await _supa.from('customers').select('data').eq('id',custId).single();
        if(!er.error && er.data){
          var ed = er.data.data || {};
          if(!ed.touches) ed.touches = [];
          if(!ed.touches.some(function(t){ return t.crId===crId; })){
            ed.touches.unshift(consultEntry);
            ed.touches.unshift(touchEntry);
          }
          var ur = await _supa.from('customers')
            .update({ data:ed, last_touch_at:now }).eq('id',custId);
          if(ur.error) throw new Error(ur.error.message);
          console.log('[CF] Supabase customers UPDATE(터치) 완료 | custId:', custId);
        }
      }catch(e){ console.error('[CF] customers UPDATE 실패:', e.message); }
    }
    // 로컬 기존고객 터치 추가
    var db2 = gdb();
    for(var j=0; j<db2.customers.length; j++){
      if(db2.customers[j].id === custId){
        var d2 = db2.customers[j].data || {};
        if(!d2.touches) d2.touches = [];
        if(!d2.touches.some(function(t){ return t.crId===crId; })){
          d2.touches.unshift(consultEntry);
          d2.touches.unshift(touchEntry);
        }
        db2.customers[j].data = d2;
        db2.customers[j].last_touch_at = now;
        db2.customers[j].updatedAt = now;
        break;
      }
    }
    sdb(db2);
    console.log('[CF] 로컬 기존고객 터치 추가 완료 | custId:', custId);
  }

  // [4] simple_consult_requests INSERT (custId 연결)
  if(_supa){
    try{
      var crSupa = {
        customer_id:   custId,
        customer_name: custName,
        types:         purpose || '',
        message:       content || '',
        status:        '신규',
        created_at:    now
      };
      console.log('[CF] simple_consult_requests | customer_id:', custId);
      var crR = await _supa.from('simple_consult_requests').insert(crSupa);
      if(crR.error) console.warn('[CF] consult_requests 실패:', crR.error.message);
      else          console.log('[CF] simple_consult_requests INSERT 완료');
    }catch(e){ console.warn('[CF] consult_requests 오류:', e.message); }
  }

  // [5] wd_cr_list 로컬 (custId 연결)
  try{
    var crList = JSON.parse(localStorage.getItem(CRKEY)||'[]');
    crList.unshift({
      id:crId, type:'상담요청', createdAt:now,
      name:custName, phone:phone, job:job||'', address:address||'',
      purpose:purpose||'', content:content||'',
      isExisting:isExisting, custId:custId, status:'신규접수'
    });
    localStorage.setItem(CRKEY, JSON.stringify(crList));
    console.log('[CF] wd_cr_list 저장 완료 | custId:', custId);
  }catch(e){ console.warn('[CF] cr_list 실패:', e.message); }

  // [6] wd_wcm3 업무센터 할일 (custId 연결)
  try{
    var wcmAll  = JSON.parse(localStorage.getItem(WCMKEY)||'{}');
    var dayData = wcmAll[todayStr] || {date:todayStr,tasks:[]};
    if(!dayData.tasks) dayData.tasks = [];
    if(!dayData.tasks.some(function(t){ return t.crId===crId; })){
      dayData.tasks.unshift({
        id:'WCT_'+Date.now(), type:'신규 상담 신청',
        custId:custId, custName:custName,
        content:custName+' | '+(purpose||'상담 신청'),
        done:false, createdAt:now, crId:crId, source:'consult_form'
      });
      wcmAll[todayStr] = dayData;
      localStorage.setItem(WCMKEY, JSON.stringify(wcmAll));
      console.log('[CF] wd_wcm3 할일 저장 완료 | custId:', custId);
    }
  }catch(e){ console.warn('[CF] wcm3 실패:', e.message); }

  // [7] wd_todos 메인 오늘할일 (custId 연결)
  try{
    var todos = JSON.parse(localStorage.getItem(TDOKEY)||'[]');
    if(!todos.some(function(t){ return t.crId===crId; })){
      todos.push({
        id:'TODO_'+Date.now(), cid:custId, name:custName,
        category:'new', text:'신규 상담 신청',
        is_done:false, date:todayStr, source:'consult_form', crId:crId
      });
      localStorage.setItem(TDOKEY, JSON.stringify(todos));
      console.log('[CF] wd_todos 저장 완료 | custId:', custId);
    }
  }catch(e){ console.warn('[CF] todos 실패:', e.message); }

  console.log('[CF] 전체 완료 | custId:', custId, '| crId:', crId, '| isExisting:', isExisting);
  return { crId:crId, custId:custId, isExisting:isExisting };
}

// ══════════════════════════════════════════════════════════
// 폼 제출
// ══════════════════════════════════════════════════════════
async function submitForm(){
  var custName = (document.getElementById('f-name').value    ||'').trim();
  var phone    = (document.getElementById('f-phone').value   ||'').trim();
  var purpose  = (document.getElementById('f-purpose-hidden').value||'').trim();
  var agree    = document.getElementById('f-agree').checked;
  var job      = document.getElementById('f-job').value      ||'';
  var address  = (document.getElementById('f-address').value ||'').trim();
  var content  = (document.getElementById('f-content').value ||'').trim();

  console.log('[CF] submitForm | custName:', custName, '| phone:', phone);

  if(!custName){ alert('이름을 입력해주세요'); return; }
  if(!normPh(phone)){ alert('연락처를 입력해주세요'); return; }
  if(!purpose){ document.getElementById('err-purpose').style.display='block'; return; }
  if(!agree){ alert('개인정보 수집·이용에 동의해주세요'); return; }

  var btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '⏳ 접수 중...';

  try{
    var result = await cfFullFlow(custName, phone, job, address, purpose, content);
    showDone(custName, phone, purpose, result.isExisting);
  }catch(e){
    console.error('[CF] 오류:', e.message);
    alert('접수 중 오류가 발생했습니다. 다시 시도해주세요.');
    btn.disabled = false; btn.textContent = '🙋 상담 신청하기';
  }
}

// ══════════════════════════════════════════════════════════
// 완료 화면
// ══════════════════════════════════════════════════════════
function showDone(custName, phone, purpose, isExisting){
  document.getElementById('form-view').style.display='none';
  document.getElementById('done-view').style.display='block';
  window.scrollTo(0,0);
  var badge = document.getElementById('done-cust-badge');
  badge.innerHTML = isExisting
    ? '<span class="done-badge done-badge-exist">기존 고객 연결됨</span>'
    : '<span class="done-badge done-badge-new">신규 고객으로 등록됨</span>';
  var n=new Date();
  var dt=n.getFullYear()+'.'+String(n.getMonth()+1).padStart(2,'0')+'.'+String(n.getDate()).padStart(2,'0')
       +' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('done-info-box').innerHTML=
    '<div class="done-info-row"><span class="done-info-label">고객명</span><span class="done-info-val">'+custName+'</span></div>'+
    '<div class="done-info-row"><span class="done-info-label">연락처</span><span class="done-info-val">'+phone+'</span></div>'+
    '<div class="done-info-row"><span class="done-info-label">상담 목적</span><span class="done-info-val">'+purpose+'</span></div>'+
    '<div class="done-info-row"><span class="done-info-label">접수 상태</span><span class="done-info-val" style="color:#92400e;">신규접수</span></div>'+
    '<div class="done-info-row"><span class="done-info-label">접수 일시</span><span class="done-info-val">'+dt+'</span></div>';
}
</script>
